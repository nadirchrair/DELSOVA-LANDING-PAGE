<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/assets/delsova-1.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ====== SEO PRIMARY ====== -->
  <title>Delsova — Agence Digitale IA | Développement Web & SaaS en Algérie</title>
  <meta name="description" content="Delsova est une agence digitale spécialisée en intelligence artificielle, développement web, SaaS et applications mobiles en Algérie (Oran). Transformez votre entreprise avec nos solutions IA sur mesure." />
  <meta name="keywords" content="agence digitale Algérie, agence IA Algérie, développement web Oran, SaaS Algérie, applications mobiles Algérie, intelligence artificielle, marketing digital Algérie, Delsova" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Delsova" />
  <link rel="canonical" href="https://delsova.dz/" />

  <!-- ====== OPEN GRAPH (Facebook / LinkedIn) ====== -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://delsova.dz/" />
  <meta property="og:title" content="Delsova — Agence Digitale IA en Algérie" />
  <meta property="og:description" content="Spécialisée en IA, développement web, SaaS et mobile. Delsova accompagne les entreprises algériennes dans leur transformation digitale." />
  <meta property="og:image" content="https://delsova.dz/assets/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Delsova" />
  <meta property="og:locale" content="fr_DZ" />

  <!-- ====== TWITTER CARD ====== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://delsova.dz/" />
  <meta name="twitter:title" content="Delsova — Agence Digitale IA en Algérie" />
  <meta name="twitter:description" content="Spécialisée en IA, développement web, SaaS et mobile. Delsova accompagne les entreprises algériennes dans leur transformation digitale." />
  <meta name="twitter:image" content="https://delsova.dz/assets/og-image.png" />

  <!-- ====== GEO TARGETING ====== -->
  <meta name="geo.region" content="DZ" />
  <meta name="geo.placename" content="Oran, Algérie" />

  <!-- ====== SCHEMA.ORG JSON-LD ====== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Delsova",
    "alternateName": "Delsova Technologies",
    "url": "https://delsova.dz",
    "logo": "https://delsova.dz/assets/delsova-1.png",
    "description": "Agence digitale spécialisée en intelligence artificielle, développement web, SaaS et applications mobiles en Algérie.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Oran",
      "addressCountry": "DZ"
    },
    "areaServed": {
      "@type": "Country",
      "name": "Algeria"
    },
    "serviceType": ["Développement Web", "Intelligence Artificielle", "SaaS", "Applications Mobiles", "Marketing Digital"],
    "sameAs": [
      "https://www.linkedin.com/company/delsova",
      "https://www.facebook.com/delsova"
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "availableLanguage": ["French", "Arabic"]
    }
  }
  </script>

  <!-- ====== WEBSITE SCHEMA ====== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Delsova",
    "url": "https://delsova.dz",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://delsova.dz/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ====== FONTS ====== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
